groups:
  - name: mcp_agent_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"

      - alert: AgentStuck
        expr: agent_tasks_in_progress > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Multiple tasks stuck in progress"
